<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 560px;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #f8fafc;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.375rem;
        }
        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        button:hover { background: #2563eb; }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            display: none;
        }
        .result a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 1.125rem;
            word-break: break-all;
        }
        .result a:hover { text-decoration: underline; }
        .result .meta {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .error {
            color: #f87171;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p class="subtitle">Shorten your links, track your clicks.</p>

        <form id="shorten-form">
            <div class="form-group">
                <label for="url">URL</label>
                <input type="url" id="url" placeholder="https://example.com/very/long/url" required>
            </div>
            <div class="form-group">
                <label for="expires">Expires in</label>
                <select id="expires">
                    <option value="">Never</option>
                    <option value="30m">30 minutes</option>
                    <option value="1h">1 hour</option>
                    <option value="24h">24 hours</option>
                    <option value="7d">7 days</option>
                    <option value="30d">30 days</option>
                </select>
            </div>
            <button type="submit">Shorten</button>
        </form>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <a id="short-url" href="#" target="_blank"></a>
            <div class="meta" id="expires-info"></div>
        </div>
    </div>

    <script>
        document.getElementById('shorten-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = document.getElementById('url').value;
            const expiresIn = document.getElementById('expires').value;
            const errorEl = document.getElementById('error');
            const resultEl = document.getElementById('result');

            errorEl.style.display = 'none';
            resultEl.style.display = 'none';

            const body = { url };
            if (expiresIn) body.expires_in = expiresIn;

            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text.trim());
                }

                const data = await res.json();
                const shortUrlEl = document.getElementById('short-url');
                shortUrlEl.href = data.short_url;
                shortUrlEl.textContent = data.short_url;

                const expiresInfo = document.getElementById('expires-info');
                if (data.expires_at) {
                    const d = new Date(data.expires_at);
                    expiresInfo.textContent = 'Expires: ' + d.toLocaleString();
                } else {
                    expiresInfo.textContent = 'No expiration';
                }

                resultEl.style.display = 'block';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
